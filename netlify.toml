[build]
  base = "landing-page-project"
  command = "npm run build"
  publish = "landing-page-project/dist"

[functions]
  directory = "landing-page-project/netlify/functions"

[dev]
  command = "npm run dev"
  targetPort = 5173
  port = 8888
  autoLaunch = false

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200